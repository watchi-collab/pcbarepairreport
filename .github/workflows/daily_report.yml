name: Send Daily Repair Report

on:
  schedule:
    - cron: '0 10 * * *' # ส่งทุกวันเวลา 17:00 น. ไทย
  workflow_dispatch:      # ปุ่มกดทดสอบเอง

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # อัปเดตเวอร์ชัน Python ให้ใหม่ขึ้น

      - name: Install dependencies
        run: |
          pip install pandas gspread oauth2client requests pytz

      - name: Run report script
        env:
          # ต้องตรงกับชื่อใน GitHub Secrets
          GCP_JSON_DATA: ${{ secrets.GCP_JSON_DATA }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
        run: python daily_report.py
